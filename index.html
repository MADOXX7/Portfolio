<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MADOXX7 | Dev</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ícones (FontAwesome ou DevIcons para as linguagens) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Bloco Central (Efeito Vidro) -->
    <main class="glass-container">
        
        <!-- Cabeçalho / Avatar -->
        <header class="profile-header">
            <img src="https://github.com/MADOXX7.png" alt="Avatar" class="avatar">
            <h1>Hi, I'm Madoxx</h1>
            <p class="status">🟢 Online</p>
        </header>

        <!-- Pequena Bio -->
        <section class="bio">
            <p>Independent developer focused on Backend, Java, and Algorithms. Building systems and breaking things since forever.</p>
        </section>

        <!-- Seção de Widgets (Música / Status do Discord) -->
        <!-- Dica: kyrie25 usa integrações como Lanyard API para puxar o Spotify em tempo real -->
        <section class="widgets">
            <div class="card-spotify">
                <i class="fab fa-spotify"></i>
                <div class="song-info">
                    <span class="track-name">Listening to Spotify...</span>
                </div>
            </div>
        </section>

        <!-- Tech Stack (Ícones agrupados igual a imagem) -->
        <section class="stack-section">
            <h3>Backend Stack</h3>
            <div class="icons-grid">
                <i class="fab fa-java"></i>
                <i class="fab fa-js"></i>
                <i class="fab fa-python"></i>
                <!-- Ícone de C feito em texto ou imagem customizada se preferir -->
                <span class="c-icon">C</span> 
            </div>
        </section>

        <!-- Redes Sociais / Contatos -->
        <footer class="social-links">
            <a href="https://github.com/MADOXX7" target="_blank"><i class="fab fa-github"></i></a>
            <a href="#" target="_blank"><i class="fab fa-discord"></i></a>
        </footer>

    </main>

</body>
</html>
